<svg xmlns="http://www.w3.org/2000/svg" width="800" height="340" viewBox="0 0 800 340">
  <defs>
    <style>
      .bg { fill: #0d1117; }
      .window { fill: #161b22; stroke: #30363d; stroke-width: 1; }
      .titlebar { fill: #161b22; }
      .dot-red { fill: #ff5f56; }
      .dot-yellow { fill: #ffbd2e; }
      .dot-green { fill: #27c93f; }
      .text { font-family: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace; font-size: 14px; }
      .prompt { fill: #7ee787; }
      .command { fill: #e6edf3; }
      .comment { fill: #8b949e; }
      .output { fill: #c9d1d9; }
      .success { fill: #3fb950; }
      .highlight { fill: #d2a8ff; }
      .dim { fill: #6e7681; }
      .divider { stroke: #30363d; stroke-width: 1; }
    </style>
    <clipPath id="windowClip">
      <rect x="1" y="1" width="798" height="338" rx="10" ry="10"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect class="bg" width="800" height="340" rx="12" ry="12"/>

  <!-- Terminal Window -->
  <g clip-path="url(#windowClip)">
    <rect class="window" x="1" y="1" width="798" height="338"/>

    <!-- Title Bar -->
    <rect class="titlebar" x="1" y="1" width="798" height="36"/>
    <circle class="dot-red" cx="24" cy="19" r="6"/>
    <circle class="dot-yellow" cx="44" cy="19" r="6"/>
    <circle class="dot-green" cx="64" cy="19" r="6"/>
    <text class="text dim" x="400" y="24" text-anchor="middle" font-size="12" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">wax — zsh</text>

    <!-- Line 1: remember command -->
    <text class="text" x="24" y="68">
      <tspan class="prompt">$</tspan>
      <tspan class="command" dx="8">wax-cli remember </tspan>
      <tspan class="highlight">"An automobile needs periodic maintenance."</tspan>
    </text>

    <!-- Line 2: success output -->
    <text class="text output" x="24" y="94">
      <tspan class="success">✓</tspan>
      <tspan dx="6">Saved to ~/.wax/memory.wax</tspan>
      <tspan class="dim" dx="8">(id: a3f7d2e1)</tspan>
    </text>

    <!-- Line 3: search command -->
    <text class="text" x="24" y="132">
      <tspan class="prompt">$</tspan>
      <tspan class="command" dx="8">wax-cli search </tspan>
      <tspan class="highlight">"car service"</tspan>
      <tspan class="command"> --mode hybrid --topK 3</tspan>
    </text>

    <!-- Divider line -->
    <line class="divider" x1="24" y1="152" x2="776" y2="152"/>

    <!-- Search results -->
    <text class="text output" x="24" y="178">
      <tspan class="dim">1.</tspan>
      <tspan dx="6" class="highlight">0.94</tspan>
      <tspan dx="6">An automobile needs periodic maintenance.</tspan>
    </text>

    <text class="text output" x="24" y="202">
      <tspan class="dim">2.</tspan>
      <tspan dx="6" class="highlight">0.71</tspan>
      <tspan dx="6">Check tire pressure and oil levels monthly.</tspan>
    </text>

    <text class="text output" x="24" y="226">
      <tspan class="dim">3.</tspan>
      <tspan dx="6" class="highlight">0.63</tspan>
      <tspan dx="6">The garage is open on weekdays from 8am.</tspan>
    </text>

    <!-- Latency footer -->
    <text class="text" x="24" y="264">
      <tspan class="dim">3 results in</tspan>
      <tspan dx="4" class="success">5.8ms</tspan>
      <tspan class="dim"> (hybrid text + vector)</tspan>
    </text>

    <!-- Second command -->
    <text class="text" x="24" y="302">
      <tspan class="prompt">$</tspan>
      <tspan class="command" dx="8">wax-cli search </tspan>
      <tspan class="highlight">"car service"</tspan>
      <tspan class="command"> --mode text</tspan>
    </text>

    <text class="text" x="24" y="322">
      <tspan class="dim">1 result in</tspan>
      <tspan dx="4" class="success">2.1ms</tspan>
      <tspan class="dim"> (text-only, no embedder)</tspan>
    </text>
  </g>
</svg>
