<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#111111"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg-grad)"/>

  <!-- Title -->
  <text x="400" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#ffffff" text-anchor="middle">Cloud RAG vs. On-Device Memory</text>

  <!-- Left: Cloud RAG -->
  <rect x="30" y="50" width="350" height="320" rx="8" fill="#0f0f0f" stroke="#ef4444" stroke-width="1" stroke-opacity="0.5"/>
  <text x="205" y="75" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#ef4444" text-anchor="middle">Cloud RAG</text>

  <!-- Agent -->
  <rect x="150" y="95" width="110" height="40" rx="6" fill="#1e1e1e" stroke="#3f3f46"/>
  <text x="205" y="120" font-family="system-ui, sans-serif" font-size="11" fill="#a1a1aa" text-anchor="middle">AI Agent</text>

  <!-- Network arrow 1 -->
  <line x1="205" y1="135" x2="205" y2="155" stroke="#ef4444" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="220" y="150" font-family="JetBrains Mono, monospace" font-size="8" fill="#ef4444">~50ms</text>

  <!-- API Gateway -->
  <rect x="130" y="160" width="150" height="35" rx="6" fill="#1e1e1e" stroke="#f59e0b"/>
  <text x="205" y="182" font-family="system-ui, sans-serif" font-size="10" fill="#f59e0b" text-anchor="middle">API Gateway</text>

  <!-- Split arrows -->
  <line x1="160" y1="195" x2="100" y2="220" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="205" y1="195" x2="205" y2="220" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="250" y1="195" x2="310" y2="220" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Services -->
  <rect x="50" y="225" width="100" height="50" rx="6" fill="#1e1e1e" stroke="#8b5cf6"/>
  <text x="100" y="245" font-family="system-ui, sans-serif" font-size="9" fill="#8b5cf6" text-anchor="middle">Vector DB</text>
  <text x="100" y="262" font-family="JetBrains Mono, monospace" font-size="8" fill="#64748b" text-anchor="middle">Pinecone</text>

  <rect x="155" y="225" width="100" height="50" rx="6" fill="#1e1e1e" stroke="#06b6d4"/>
  <text x="205" y="245" font-family="system-ui, sans-serif" font-size="9" fill="#06b6d4" text-anchor="middle">Text Search</text>
  <text x="205" y="262" font-family="JetBrains Mono, monospace" font-size="8" fill="#64748b" text-anchor="middle">Elasticsearch</text>

  <rect x="260" y="225" width="100" height="50" rx="6" fill="#1e1e1e" stroke="#10b981"/>
  <text x="310" y="245" font-family="system-ui, sans-serif" font-size="9" fill="#10b981" text-anchor="middle">Documents</text>
  <text x="310" y="262" font-family="JetBrains Mono, monospace" font-size="8" fill="#64748b" text-anchor="middle">S3 / Files</text>

  <!-- Total latency -->
  <rect x="100" y="300" width="210" height="45" rx="6" fill="#ef4444" fill-opacity="0.1" stroke="#ef4444"/>
  <text x="205" y="318" font-family="system-ui, sans-serif" font-size="10" fill="#ef4444" text-anchor="middle">Total Latency</text>
  <text x="205" y="338" font-family="JetBrains Mono, monospace" font-size="14" font-weight="600" fill="#ef4444" text-anchor="middle">150-500ms+</text>

  <!-- Right: On-Device -->
  <rect x="420" y="50" width="350" height="320" rx="8" fill="#0f0f0f" stroke="#10b981" stroke-width="1" stroke-opacity="0.5"/>
  <text x="595" y="75" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#10b981" text-anchor="middle">Wax On-Device</text>

  <!-- Agent -->
  <rect x="545" y="95" width="100" height="40" rx="6" fill="#1e1e1e" stroke="#3f3f46"/>
  <text x="595" y="120" font-family="system-ui, sans-serif" font-size="11" fill="#a1a1aa" text-anchor="middle">AI Agent</text>

  <!-- Direct arrow -->
  <line x1="595" y1="135" x2="595" y2="175" stroke="#10b981" stroke-width="2"/>
  <polygon points="595,175 590,165 600,165" fill="#10b981"/>

  <!-- Wax file -->
  <rect x="510" y="180" width="170" height="80" rx="8" fill="#10b981" fill-opacity="0.1" stroke="#10b981" stroke-width="2" filter="url(#glow)"/>
  <text x="595" y="210" font-family="JetBrains Mono, monospace" font-size="14" font-weight="600" fill="#10b981" text-anchor="middle">.wax</text>
  <text x="595" y="228" font-family="system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">FTS5 + HNSW + WAL</text>
  <text x="595" y="243" font-family="system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Documents + Embeddings</text>

  <!-- Latency -->
  <rect x="520" y="280" width="150" height="45" rx="6" fill="#10b981" fill-opacity="0.1" stroke="#10b981"/>
  <text x="595" y="298" font-family="system-ui, sans-serif" font-size="10" fill="#10b981" text-anchor="middle">Total Latency</text>
  <text x="595" y="318" font-family="JetBrains Mono, monospace" font-size="14" font-weight="600" fill="#10b981" text-anchor="middle">6.1ms</text>

  <!-- Comparison badge -->
  <rect x="480" y="335" width="230" height="25" rx="12" fill="#10b981" fill-opacity="0.2"/>
  <text x="595" y="352" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#10b981" text-anchor="middle">25-80x faster</text>

  <!-- Footer -->
  <text x="400" y="390" font-family="system-ui, sans-serif" font-size="10" fill="#3f3f46" text-anchor="middle">100% on-device • No network calls • No API keys</text>
</svg>
